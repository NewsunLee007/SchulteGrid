<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>舒尔特方格 (Schulte Grid) 生成器</title>
    <!-- 引入美观的系统字体 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 控制面板 (打印时隐藏) -->
        <header class="controls no-print">
            <div class="header-titles">
                <h1>舒尔特方格</h1>
                <p class="subtitle">专注力与视野训练工具</p>
            </div>
            
            <div class="settings-card">
                <div class="setting-item">
                    <label for="grid-size">方格规格 (N×N):</label>
                    <div class="custom-select">
                        <select id="grid-size">
                            <option value="3">3 × 3 (9格 - 幼儿)</option>
                            <option value="4">4 × 4 (16格 - 入门)</option>
                            <option value="5" selected>5 × 5 (25格 - 标准)</option>
                            <option value="6">6 × 6 (36格 - 进阶)</option>
                            <option value="7">7 × 7 (49格 - 困难)</option>
                            <option value="8">8 × 8 (64格 - 极难)</option>
                            <option value="9">9 × 9 (81格 - 大师)</option>
                        </select>
                    </div>
                </div>

                <div class="actions">
                    <button id="btn-generate" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21L21.5 8"></path></svg>
                        换一组
                    </button>
                    <button id="btn-print" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        导出 PDF
                    </button>
                </div>

                <!-- 计时器与控制区 -->
                <div class="timer-section">
                    <div class="timer-display">
                        <span id="timer-value">00:00.00</span>
                    </div>
                    <div class="timer-actions">
                        <button id="btn-finish" class="btn btn-danger" disabled>
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                            结束训练
                        </button>
                        <button id="btn-history" class="btn btn-outline">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            历史记录
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 打印专用的页眉 (屏幕上隐藏，打印时显示) -->
        <div class="print-header only-print">
            <h2 class="print-title">舒尔特方格专注力训练</h2>
            <div class="print-meta">
                <span>规格: <span id="print-size">5×5</span></span>
                <span>日期: ____________</span>
                <span>用时: ____________</span>
            </div>
        </div>

        <!-- 舒尔特方格展示区 (屏幕显示) -->
        <main class="grid-wrapper screen-only">
            <div id="schulte-grid" class="grid-container">
                <!-- JavaScript 将动态填充方格 -->
            </div>
        </main>

        <!-- 打印专用的四宫格容器 (屏幕上隐藏，打印时显示) -->
        <div class="print-grid-layout only-print" id="print-layout">
            <!-- JS 将动态在这里生成 4 个方格 -->
        </div>
        
        <!-- 打印时底部的额外空间/装饰 -->
        <footer class="no-print">
            <p>💡 提示：点击任意数字开始计时，完成后点击“结束训练”保存成绩。</p>
        </footer>

        <!-- 历史记录弹窗 -->
        <div id="history-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>训练记录</h3>
                    <button id="btn-close-modal" class="btn-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <ul id="history-list" class="history-list">
                        <!-- 动态渲染历史记录 -->
                    </ul>
                </div>
                <div class="modal-footer">
                    <button id="btn-clear-history" class="btn btn-outline" style="width: 100%; color: #ef4444; border-color: #fca5a5;">清空记录</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
